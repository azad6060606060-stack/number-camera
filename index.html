<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matrix Camera FIX</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        canvas { display: none; width: 100vw; height: 100vh; }
        .ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000; z-index: 100;
        }
        button {
            width: 80%; max-width: 300px; padding: 20px;
            background: #000; color: #0f0; border: 2px solid #0f0;
            font-size: 18px; font-weight: bold; border-radius: 12px;
            box-shadow: 0 0 20px #0f0; margin: 10px;
        }
        #switchBtn { position: absolute; bottom: 30px; z-index: 101; display: none; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <canvas id="c"></canvas>
    <video id="v" playsinline muted autoplay></video>

    <div id="ui" class="ui">
        <button id="startBtn">СТАТЬ ЧАСТЬЮ КОДА</button>
    </div>
    
    <button id="switchBtn">СМЕНИТЬ КАМЕРУ</button>

    <script>
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const ctx = c.getContext('2d', { willReadFrequently: true });
        const ui = document.getElementById('ui');
        const startBtn = document.getElementById('startBtn');
        const switchBtn = document.getElementById('switchBtn');

        let currentMode = "environment"; 
        let isRunning = false;
        const fontSize = 11;
        const digits = "0123456789".split("");

        async function startMatrix() {
            try {
                // Остановка старых треков перед запуском новых
                if (v.srcObject) {
                    v.srcObject.getTracks().forEach(track => track.stop());
                }

                const constraints = { 
                    video: { facingMode: currentMode }, 
                    audio: false 
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                v.srcObject = stream;

                // Важно: ждем загрузки и принудительно запускаем play()
                await v.play();
                
                ui.style.display = 'none';
                c.style.display = 'block';
                switchBtn.style.display = 'block';

                if (!isRunning) {
                    isRunning = true;
                    drawFrame();
                }
            } catch (err) {
                alert("Ошибка доступа к камере! Проверьте настройки HTTPS на GitHub.");
                console.error(err);
            }
        }

        startBtn.onclick = startMatrix;
        
        switchBtn.onclick = () => {
            currentMode = (currentMode === "environment") ? "user" : "environment";
            startMatrix(); // Перезапуск с новой камерой
        };

        function drawFrame() {
            if (!isRunning) return;

            c.width = window.innerWidth;
            c.height = window.innerHeight;
            
            const cols = Math.floor(c.width / fontSize);
            const rows = Math.floor(c.height / fontSize);

            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, c.width, c.height);

            // Обработка видео через скрытый canvas
            const tmpC = document.createElement('canvas');
            tmpC.width = cols;
            tmpC.height = rows;
            const tmpCtx = tmpC.getContext('2d');
            tmpCtx.drawImage(v, 0, 0, cols, rows);
            
            const imgData = tmpCtx.getImageData(0, 0, cols, rows).data;

            ctx.font = fontSize + "px monospace";
            ctx.textAlign = "center";

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const i = (y * cols + x) * 4;
                    const brightness = (imgData[i] + imgData[i+1] + imgData[i+2]) / 3;

                    // Динамическая прозрачность и свечение
                    const alpha = 0.1 + (brightness / 255) * 0.9;
                    
                    if (brightness > 190) {
                        ctx.fillStyle = rgba(200, 255, 200, ${alpha});
                        ctx.shadowBlur = 5;
                        ctx.shadowColor = "#0f0";
                    } else {
                        ctx.fillStyle = rgba(0, 255, 0, ${alpha});
                        ctx.shadowBlur = 0;
                    }

                    const char = digits[Math.floor(Math.random() * digits.length)];
                    ctx.fillText(char, x * fontSize + fontSize/2, y * fontSize + fontSize);
                }
            }
            requestAnimationFrame(drawFrame);
        }
    </script>
</body>
</html>
