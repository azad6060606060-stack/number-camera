<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Vision</title>
  <style>
    body { text-align:center; background:#000; color:#0f0; font-family:Arial; }
    video, canvas { width:90%; max-width:400px; margin-top:10px; border-radius:10px; }
    button { padding:15px; margin:10px; font-size:16px; border-radius:10px; border:none; background:#0f0; color:black; }
  </style>
</head>
<body>

<h2>🟢 Matrix Vision</h2>

<button onclick="startSystem()">Стать частью кода</button>
<button onclick="switchCamera()">Сменить камеру</button>

<br>
<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
let stream = null;
let useFront = true;
let started = false;

// 🚀 запуск
async function startSystem() {
  if (started) return;
  started = true;

  await startCamera();
  runEffect();
}

// 📷 камера
async function startCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
  }

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: useFront ? "user" : "environment" }
  });

  document.getElementById("video").srcObject = stream;
}

// 🔁 смена камеры
function switchCamera() {
  useFront = !useFront;
  if (started) startCamera();
}

// 🧠 эффект "зелёного силуэта"
function runEffect() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  function loop() {
    if (video.videoWidth === 0) {
      requestAnimationFrame(loop);
      return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let data = frame.data;

    for (let i = 0; i < data.length; i += 4) {
      let r = data[i];
      let g = data[i+1];
      let b = data[i+2];

      // 🧠 яркость
      let brightness = (r + g + b) / 3;

      if (brightness > 100) {
        // светлое → зелёное
        data[i] = 0;
        data[i+1] = 255;
        data[i+2] = 0;
      } else {
        // тёмное → чёрное
        data[i] = 0;
        data[i+1] = 0;
        data[i+2] = 0;
      }
    }

    ctx.putImageData(frame, 0, 0);

    requestAnimationFrame(loop);
  }

  loop();
}
</script>

</body>
</html>
