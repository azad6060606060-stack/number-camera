<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Human Code</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; display: flex; flex-direction: column; align-items: center; }
        canvas { display: block; }
        .controls { position: absolute; bottom: 20px; display: flex; gap: 10px; z-index: 10; }
        button { padding: 12px 20px; font-size: 14px; background: rgba(0, 255, 70, 0.1); color: #00ff46; border: 2px solid #00ff46; border-radius: 5px; cursor: pointer; font-family: monospace; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <button id="switchBtn">Камера</button>
        <button id="startBtn">Стать частью кода</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const video = document.createElement('video');
        const switchBtn = document.getElementById('switchBtn');
        const startBtn = document.getElementById('startBtn');

        let width, height;
        const fontSize = 10; // Размер символа кода
        let columns, rows;
        const chars = "0123456789ABCDEFHIJKLMNOPQRSTUVWXYZ$+-*/=%";
        let useFrontCamera = true;
        let isMatrixActive = false;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / fontSize);
            rows = Math.floor(height / fontSize);
        }

        window.addEventListener('resize', resize);
        resize();

        async function initCamera() {
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            const constraints = { video: { facingMode: useFrontCamera ? "user" : "environment" } };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.play();
            } catch (err) { alert("Ошибка камеры"); }
        }

        switchBtn.onclick = () => { useFrontCamera = !useFrontCamera; initCamera(); };
        startBtn.onclick = () => { isMatrixActive = !isMatrixActive; };

        function draw() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                if (isMatrixActive) {
                    // Эффект "Стать частью кода"
                    ctx.fillStyle = "black";
                    ctx.fillRect(0, 0, width, height);

                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = columns;
                    tempCanvas.height = rows;
                    const tCtx = tempCanvas.getContext('2d');
                    
                    // Зеркалим изображение для фронталки
                    if(useFrontCamera) {
                        tCtx.translate(columns, 0);
                        tCtx.scale(-1, 1);
                    }
                    tCtx.drawImage(video, 0, 0, columns, rows);
                    
                    const pixels = tCtx.getImageData(0, 0, columns, rows).data;

                    ctx.font = fontSize + "px monospace";
                    for (let y = 0; y < rows; y++) {
                        for (let x = 0; x < columns; x++) {
                            const i = (y * columns + x) * 4;
                            const brightness = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                            
                            if (brightness > 40) {
                                // Если пиксель светлый, рисуем символ
                                const char = chars[Math.floor(Math.random() * chars.length)];
                                // Чем ярче точка, тем ярче зеленый цвет
                                ctx.fillStyle = rgb(0, ${brightness}, 0);
                                ctx.fillText(char, x * fontSize, y * fontSize);
                            }
                        }
                    }
                } else {
                    // Обычное превью камеры
                    ctx.save();
                    if(useFrontCamera) {
                        ctx.translate(width, 0);
                        ctx.scale(-1, 1);
                    }
                    ctx.drawImage(video, 0, 0, width, height);
                    ctx.restore();
                }
            }
            requestAnimationFrame(draw);
        }

        initCamera();
        draw();
    </script>
</body>
</html>
