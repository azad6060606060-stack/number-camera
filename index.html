<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matrix Camera Fix</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        canvas { display: none; width: 100vw; height: 100vh; }
        
        .ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 20px; z-index: 100; background: rgba(0,0,0,0.9);
        }

        button {
            width: 80%; max-width: 300px; padding: 20px;
            background: #000; color: #0f0; border: 2px solid #0f0;
            font-size: 18px; font-weight: bold; border-radius: 10px;
            box-shadow: 0 0 15px #0f0;
        }

        #status { color: #0f0; text-align: center; font-size: 14px; padding: 10px; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body>

    <canvas id="c"></canvas>
    <video id="v" playsinline muted autoplay></video>

    <div id="ui" class="ui">
        <div id="status">Система готова к подключению...</div>
        <button id="startBtn">СТАТЬ ЧАСТЬЮ КОДА</button>
        <button id="switchBtn" style="display:none;">СМЕНИТЬ КАМЕРУ</button>
    </div>

    <script>
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const ctx = c.getContext('2d', { willReadFrequently: true });
        const ui = document.getElementById('ui');
        const startBtn = document.getElementById('startBtn');
        const switchBtn = document.getElementById('switchBtn');
        const status = document.getElementById('status');

        let mode = "environment"; 
        let isRunning = false;
        const fSize = 12;
        const symbols = "0123456789".split("");

        async function initCamera() {
            status.innerText = "Запрос доступа к объективу...";
            try {
                if (v.srcObject) {
                    v.srcObject.getTracks().forEach(t => t.stop());
                }

                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: mode }, 
                    audio: false 
                });
                
                v.srcObject = stream;
                
                // Специфический фикс для iOS
                v.setAttribute('autoplay', '');
                v.setAttribute('muted', '');
                v.setAttribute('playsinline', '');
                
                await v.play();
                
                status.innerText = "Соединение установлено.";
                setTimeout(() => {
                    ui.style.background = "transparent";
                    ui.style.justifyContent = "flex-end";
                    ui.style.paddingBottom = "30px";
                    startBtn.style.display = "none";
                    switchBtn.style.display = "block";
                    c.style.display = "block";
                }, 500);

                if (!isRunning) {
                    isRunning = true;
                    render();
                }
            } catch (e) {
                status.style.color = "red";
                status.innerText = "ОШИБКА: " + e.message + "\nУбедитесь, что сайт открыт через HTTPS.";
            }
        }

        startBtn.onclick = initCamera;
        switchBtn.onclick = () => {
            mode = (mode === "environment") ? "user" : "environment";
            initCamera();
        };

        function render() {
            if (!isRunning) return;

            c.width = window.innerWidth;
            c.height = window.innerHeight;
            const cols = Math.floor(c.width / fSize);
            const rows = Math.floor(c.height / fSize);

            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, c.width, c.height);

            const tmp = document.createElement('canvas');
            tmp.width = cols; tmp.height = rows;
            const tCtx = tmp.getContext('2d');
            tCtx.drawImage(v, 0, 0, cols, rows);
            const data = tCtx.getImageData(0, 0, cols, rows).data;

            ctx.font = fSize + "px monospace";
            ctx.textAlign = "center";

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const i = (y * cols + x) * 4;
                    const bright = (data[i] + data[i+1] + data[i+2]) / 3;
                    
                    const alpha = 0.1 + (bright / 255) * 0.9;
                    
                    if (bright > 180) {
                        ctx.fillStyle = rgba(180, 255, 180, ${alpha});
                        ctx.shadowBlur = 4;
                        ctx.shadowColor = "#0f0";
                    } else {
                        ctx.fillStyle = rgba(0, 255, 0, ${alpha});
                        ctx.shadowBlur = 0;
                    }

                    const char = symbols[Math.floor(Math.random() * symbols.length)];
                    ctx.fillText(char, x * fSize + fSize/2, y * fSize + fSize);
                }
            }
            requestAnimationFrame(render);
        }
    </script>
</body>
</html>
