<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Vision</title>
  <style>
    body { margin:0; background:black; overflow:hidden; }
    canvas { display:block; }
    button {
      position:fixed;
      top:10px;
      left:10px;
      z-index:10;
      padding:10px;
      background:#0f0;
      border:none;
      border-radius:8px;
    }
  </style>
</head>
<body>

<button onclick="startSystem()">Старт</button>
<button onclick="switchCamera()" style="left:120px;">Камера</button>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
let stream = null;
let useFront = true;
let started = false;

// 🚀 запуск
async function startSystem() {
  if (started) return;
  started = true;

  await startCamera();
  runEffect();
  startMatrixRain();
}

// 📷 камера
async function startCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
  }

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: useFront ? "user" : "environment" }
  });

  document.getElementById("video").srcObject = stream;
}

// 🔁 камера
function switchCamera() {
  useFront = !useFront;
  if (started) startCamera();
}

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// 🧠 эффект силуэта
function runEffect() {
  const video = document.getElementById("video");

  function loop() {
    if (video.videoWidth === 0) {
      requestAnimationFrame(loop);
      return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let data = frame.data;

    for (let i = 0; i < data.length; i += 4) {
      let brightness = (data[i] + data[i+1] + data[i+2]) / 3;

      if (brightness > 100) {
        data[i] = 0;
        data[i+1] = 255;
        data[i+2] = 0;
      } else {
        data[i] = 0;
        data[i+1] = 0;
        data[i+2] = 0;
      }
    }

    ctx.putImageData(frame, 0, 0);

    requestAnimationFrame(loop);
  }

  loop();
}

// 🔢 MATRIX ЦИФЕРКИ
let columns = [];
let fontSize = 14;

function startMatrixRain() {
  const width = window.innerWidth;
  const height = window.innerHeight;

  canvas.width = width;
  canvas.height = height;

  const cols = Math.floor(width / fontSize);

  for (let i = 0; i < cols; i++) {
    columns[i] = Math.random() * height;
  }

  function rain() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#0f0";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < columns.length; i++) {
      const text = Math.random() > 0.5 ? "0" : "1";

      ctx.fillText(text, i * fontSize, columns[i]);

      if (columns[i] > canvas.height && Math.random() > 0.975) {
        columns[i] = 0;
      }

      columns[i] += fontSize;
    }

    requestAnimationFrame(rain);
  }

  rain();
}
</script>

</body>
</html>
