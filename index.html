<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Matrix Camera FIX</title>

<style>
body {
    background: black;
    color: lime;
    text-align: center;
    font-family: monospace;
}

button {
    margin: 10px;
    padding: 12px 18px;
    font-size: 16px;
    background: lime;
    color: black;
    border: none;
    border-radius: 6px;
}

canvas {
    display: block;
    margin: auto;
    border: 1px solid green;
}
</style>
</head>

<body>

<h2>📷 Matrix Camera</h2>

<button onclick="startCamera()">Start</button>
<button onclick="switchCamera()">Switch</button>

<canvas id="canvas"></canvas>

<script>
let video = document.createElement('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');

let stream = null;
let devices = [];
let currentIndex = 0;

ctx.font = "10px monospace";

// получить камеры
async function getCameras() {
    let all = await navigator.mediaDevices.enumerateDevices();
    devices = all.filter(d => d.kind === "videoinput");
}

// старт камеры
async function startCamera() {
    try {
        if (stream) {
            stream.getTracks().forEach(t => t.stop());
        }

        if (devices.length === 0) {
            await getCameras();
        }

        if (devices.length === 0) {
            alert("Камера не найдена");
            return;
        }

        let deviceId = devices[currentIndex].deviceId;

        stream = await navigator.mediaDevices.getUserMedia({
            video: { deviceId: { exact: deviceId } }
        });

        video.srcObject = stream;
        await video.play();

        video.onloadeddata = () => {
            canvas.width = 320;
            canvas.height = 240;
            draw();
        };

    } catch (e) {
        alert("Ошибка: " + e.message);
        console.error(e);
    }
}

// переключение камеры
function switchCamera() {
    if (devices.length > 1) {
        currentIndex = (currentIndex + 1) % devices.length;
        startCamera();
    } else {
        alert("Только одна камера");
    }
}

// рисование матрицы
function draw() {
    if (video.readyState < 2) {
        requestAnimationFrame(draw);
        return;
    }

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    let img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let data = img.data;

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let size = 8;

    for (let y = 0; y < canvas.height; y += size) {
        for (let x = 0; x < canvas.width; x += size) {

            let i = (y * canvas.width + x) * 4;

            let r = data[i];
            let g = data[i+1];
            let b = data[i+2];

            let brightness = (r + g + b) / 3;

            // нормальный контраст (без "белого экрана")
            let num = Math.floor(brightness / 32);

            ctx.fillStyle = rgb(0, ${brightness}, 0);
            ctx.fillText(num, x, y + size);
        }
    }

    requestAnimationFrame(draw);
}
</script>

</body>
</html>
