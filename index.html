<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Matrix Camera FIX</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #ascii-layer {
            font-size: 8px;
            line-height: 7px;
            white-space: pre;
            text-align: center;
            width: 100%;
            height: 100%;
            display: block;
            text-shadow: 0 0 5px #0f0;
        }
        #btn {
            position: absolute;
            z-index: 100;
            padding: 20px;
            background: #0f0;
            color: #000;
            border: none;
            font-weight: bold;
            border-radius: 10px;
        }
        video, canvas { position: absolute; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>

    <button id="btn" onclick="start()">ЗАПУСТИТЬ МАТРИЦУ</button>
    <pre id="ascii-layer"></pre>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const layer = document.getElementById('ascii-layer');
        const chars = ["#", "8", "0", "1", "7", "+", ":", "-", ".", " "];

        async function start() {
            document.getElementById('btn').style.display = 'none';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
                
                // Ждем, пока видео реально начнет отдавать кадры
                video.onloadedmetadata = () => {
                    video.play();
                    render();
                };
            } catch (err) {
                alert("Нет доступа к камере!");
            }
        }

        function render() {
            // Если видео не готово, ждем
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const w = 80; 
                const h = Math.floor(w * (video.videoHeight / video.videoWidth) * 0.5);
                
                canvas.width = w;
                canvas.height = h;
                ctx.drawImage(video, 0, 0, w, h);

                const data = ctx.getImageData(0, 0, w, h).data;
                let res = "";

                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        const i = (y * w + x) * 4;
                        // Считаем яркость
                        const bright = (data[i] + data[i+1] + data[i+2]) / 3;
                        // Чем ярче, тем "гуще" символ (инвертируем для черного фона)
                        const charIdx = Math.floor((bright / 255) * (chars.length - 1));
                        res += chars[charIdx];
                    }
                    res += "\n";
                }
                layer.textContent = res;
            }
            requestAnimationFrame(render);
        }
    </script>
</body>
</html>
