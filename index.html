<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Final</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #0f0; font-family: monospace; }
        canvas { display: block; }
        .controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; }
        button { padding: 15px 25px; background: black; color: #0f0; border: 2px solid #0f0; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        #errorLog { position: absolute; top: 10px; left: 10px; font-size: 12px; color: red; pointer-events: none; }
    </style>
</head>
<body>
    <div id="errorLog"></div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <button onclick="toggleCamera()">Камера</button>
        <button onclick="toggleMatrix()">Стать частью кода</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const errorLog = document.getElementById('errorLog');
        const video = document.createElement('video');
        
        let isMatrix = false;
        let useFront = true;
        const fontSize = 11;
        const chars = "0123456789QWERTYUIOPASDFGHJKLZXCVBNM";

        function log(msg) { errorLog.innerText += msg + "\n"; }

        async function initCamera() {
            try {
                log("Запрос камеры...");
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(t => t.stop());
                }
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: useFront ? "user" : "environment" }
                });
                video.muted = true;
                video.setAttribute('playsinline', 'true');
                video.srcObject = stream;
                video.play();
                log("Камера запущена успешно.");
            } catch (e) {
                log("ОШИБКА: " + e.name + " - " + e.message);
            }
        }

        function toggleCamera() { useFront = !useFront; initCamera(); }
        function toggleMatrix() { isMatrix = !isMatrix; }

        function draw() {
            const w = canvas.width = window.innerWidth;
            const h = canvas.height = window.innerHeight;

            if (video.readyState >= 2) {
                if (isMatrix) {
                    ctx.fillStyle = "black";
                    ctx.fillRect(0, 0, w, h);
                    
                    const cols = Math.floor(w / fontSize);
                    const rows = Math.floor(h / fontSize);
                    
                    const offscreen = document.createElement('canvas');
                    offscreen.width = cols; offscreen.height = rows;
                    const oCtx = offscreen.getContext('2d');
                    
                    if (useFront) { oCtx.translate(cols, 0); oCtx.scale(-1, 1); }
                    oCtx.drawImage(video, 0, 0, cols, rows);
                    
                    const pixels = oCtx.getImageData(0, 0, cols, rows).data;
                    ctx.font = fontSize + "px monospace";

                    for (let y = 0; y < rows; y++) {
                        for (let x = 0; x < cols; x++) {
                            const i = (y * cols + x) * 4;
                            const brightness = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                            
                            if (brightness > 50) {
                                ctx.fillStyle = rgb(0, ${brightness}, 0);
                                ctx.fillText(chars[Math.floor(Math.random()*chars.length)], x*fontSize, y*fontSize);
                            }
                        }
                    }
                } else {
                    ctx.save();
                    if (useFront) { ctx.translate(w, 0); ctx.scale(-1, 1); }
                    ctx.drawImage(video, 0, 0, w, h);
                    ctx.restore();
                }
            }
            requestAnimationFrame(draw);
        }

        window.onload = () => {
            initCamera();
            draw();
        };
    </script>
</body>
</html>
