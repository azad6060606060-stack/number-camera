<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stable Matrix Camera</title>
  <style>
    body { margin:0; background:black; color:#0f0; font-family:Arial; text-align:center; }
    canvas { display:block; margin:auto; }
    button {
      margin:10px;
      padding:12px;
      background:#0f0;
      border:none;
      border-radius:8px;
      color:black;
      font-weight:bold;
    }
    #status {
      position:fixed;
      bottom:10px;
      left:10px;
      font-size:14px;
      color:#0f0;
    }
  </style>
</head>
<body>

<h3>🧠 Stable Matrix System</h3>

<button onclick="startSystem()">Старт камеры</button>
<button onclick="switchCamera()">Сменить камеру</button>

<canvas id="canvas"></canvas>
<div id="status">⛔ Не запущено</div>

<script>
let stream = null;
let useFront = true;
let started = false;

const video = document.createElement("video");
video.autoplay = true;
video.playsInline = true;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const statusEl = document.getElementById("status");

// 🚀 СТАРТ СИСТЕМЫ
async function startSystem() {
  if (started) return;
  started = true;

  status("📷 Запуск камеры...");

  const ok = await startCamera();

  if (!ok) {
    status("❌ Камера не запустилась");
    return;
  }

  status("🧠 Система работает");

  runMatrix();
}

// 📷 камера (СТАБИЛЬНАЯ ВЕРСИЯ)
async function startCamera() {
  try {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
    }

    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: useFront ? "user" : "environment"
      },
      audio: false
    });

    video.srcObject = stream;

    await video.play();

    return true;

  } catch (e) {
    console.log(e);
    return false;
  }
}

// 🔁 смена камеры
function switchCamera() {
  useFront = !useFront;
  if (started) startCamera();
}

// 🧠 MATRIX РЕЖИМ (цифры)
function runMatrix() {

  const cell = 10;

  function loop() {

    if (!video.videoWidth) {
      requestAnimationFrame(loop);
      return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = frame.data;

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = cell + "px monospace";

    for (let y = 0; y < canvas.height; y += cell) {
      for (let x = 0; x < canvas.width; x += cell) {

        const i = (y * canvas.width + x) * 4;

        let r = data[i];
        let g = data[i+1];
        let b = data[i+2];

        let brightness = (r + g + b) / 3;

        let digit = Math.floor(Math.random() * 10);

        let green = Math.max(30, Math.min(255, brightness));

        ctx.fillStyle = rgb(0, ${green}, 0);
        ctx.fillText(digit, x, y);
      }
    }

    requestAnimationFrame(loop);
  }

  loop();
}

// 📊 статус
function status(text) {
  statusEl.innerText = text;
}
</script>

</body>
</html>
