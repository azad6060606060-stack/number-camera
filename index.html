<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Цифровая Камера ASCII</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #0f0; /* Хакерский зеленый */
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #ascii-layer {
            font-size: 8px;
            line-height: 7px;
            letter-spacing: 1px;
            white-space: pre;
            text-align: center;
            background: black;
            width: 100vw;
            height: 80vh;
            overflow: hidden;
        }
        .controls {
            height: 20vh;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: #111;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #0f0;
            color: #000;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div id="ascii-layer">Запуск камеры...</div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <button id="toggleBtn" onclick="toggleCamera()">ВКЛЮЧИТЬ КАМЕРУ</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const asciiLayer = document.getElementById('ascii-layer');
        const chars = "0123456789X#+- "; // Цифры для отрисовки
        let animating = false;

        async function toggleCamera() {
            if (animating) {
                animating = false;
                document.getElementById('toggleBtn').innerText = "ВКЛЮЧИТЬ";
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, // Задняя камера
                    audio: false 
                });
                video.srcObject = stream;
                animating = true;
                document.getElementById('toggleBtn').innerText = "ВЫКЛЮЧИТЬ";
                requestAnimationFrame(render);
            } catch (err) {
                asciiLayer.innerText = "Ошибка: Доступ к камере запрещен";
                console.error(err);
            }
        }

        function render() {
            if (!animating) return;

            // Настройки разрешения (чем меньше, тем быстрее работает)
            const width = 80; 
            const height = Math.floor(width * (video.videoHeight / video.videoWidth) * 0.5);

            canvas.width = width;
            canvas.height = height;

            // Рисуем кадр видео на скрытый холст
            ctx.drawImage(video, 0, 0, width, height);

            // Получаем пиксели
            const pixels = ctx.getImageData(0, 0, width, height).data;
            let asciiFrame = "";

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    const r = pixels[i];
                    const g = pixels[i+1];
                    const b = pixels[i+2];
                    
                    // Яркость
                    const brightness = (r + g + b) / 3;
                    const charIdx = Math.floor((brightness / 255) * (chars.length - 1));
                    
                    asciiFrame += chars[charIdx];
                }
                asciiFrame += "\n";
            }

            asciiLayer.textContent = asciiFrame;
            requestAnimationFrame(render);
        }
    </script>
</body>
</html>
