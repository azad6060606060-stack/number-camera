<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Run System</title>
  <style>
    body { text-align:center; font-family:Arial; background:#111; color:white; }
    video { width:90%; max-width:400px; border-radius:10px; margin-top:10px; }
    button { padding:15px; margin:10px; font-size:16px; border-radius:10px; border:none; background:#00c3ff; color:white; }
  </style>
</head>
<body>

<h2>🚀 Запуск</h2>

<button id="startBtn">Стать частью кода</button>
<button id="switchBtn">Сменить камеру</button>

<br>
<video id="video" autoplay playsinline></video>

<script>
let stream = null;
let useFront = true;
let started = false;
let loopId = null;

// 🎯 НАСТОЯЩИЙ ЗАПУСК
async function runSystem() {
  if (started) return;
  started = true;

  // 1. Камера
  await startCamera();

  // 2. Постоянная работа (как программа)
  loopId = setInterval(() => {
    // тут "живёт" твой код
    console.log("КОД РАБОТАЕТ...");
    
    // пример: можно анализировать видео, считать что-то и т.д.
  }, 1000);
}

// 📷 Камера
async function startCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
  }

  const constraints = {
    video: { facingMode: useFront ? "user" : "environment" }
  };

  stream = await navigator.mediaDevices.getUserMedia(constraints);
  document.getElementById("video").srcObject = stream;
}

// 🔁 Смена камеры
function switchCamera() {
  useFront = !useFront;
  if (started) startCamera();
}

// 🎮 КНОПКИ
document.getElementById("startBtn").onclick = runSystem;
document.getElementById("switchBtn").onclick = switchCamera;
</script>

</body>
</html>
