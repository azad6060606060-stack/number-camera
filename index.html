<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Matrix Camera</title>
  <style>
    body { margin:0; background:black; overflow:hidden; }
    canvas { display:block; }
    button {
      position:fixed;
      top:10px;
      left:10px;
      z-index:10;
      padding:10px;
      background:#0f0;
      border:none;
      border-radius:8px;
    }
  </style>
</head>
<body>

<button onclick="start()">Старт</button>
<button onclick="switchCam()" style="left:100px;">Камера</button>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
let stream = null;
let useFront = true;
let started = false;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// 🚀 запуск
async function start() {
  if (started) return;
  started = true;

  await startCamera();
  renderDigits();
}

// 📷 камера
async function startCamera() {
  try {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
    }

    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: useFront ? "user" : "environment"
      },
      audio: false
    });

    video.srcObject = stream;

    await video.play(); // 🔥 важно — принудительный запуск

  } catch (e) {
    alert("Камера не запустилась: " + e.message);
    console.log(e);
  }
}
// 🔁 камера
function switchCam() {
  useFront = !useFront;
  if (started) startCamera();
}

// 🔢 ОСНОВНАЯ ЛОГИКА — ВСЁ В ЦИФРАХ
function renderDigits() {

  const cellSize = 10; // размер "пикселя-цифры"

  function loop() {
    if (video.videoWidth === 0) {
      requestAnimationFrame(loop);
      return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = frame.data;

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = cellSize + "px monospace";

    for (let y = 0; y < canvas.height; y += cellSize) {
      for (let x = 0; x < canvas.width; x += cellSize) {

        const i = (y * canvas.width + x) * 4;

        let r = data[i];
        let g = data[i+1];
        let b = data[i+2];

        let brightness = (r + g + b) / 3;

        // 🔢 выбираем цифру
        let digit = Math.floor(Math.random() * 10);

        // 🟢 цвет зависит от яркости
        let green = Math.floor(brightness);

        ctx.fillStyle = rgb(0, ${green}, 0);

        ctx.fillText(digit, x, y);
      }
    }

    requestAnimationFrame(loop);
  }

  loop();
}
</script>

</body>
</html>
