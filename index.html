<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Face</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; display: flex; flex-direction: column; align-items: center; }
        canvas { display: block; }
        .controls { position: absolute; bottom: 20px; display: flex; gap: 10px; }
        button { padding: 12px; background: none; color: #0f0; border: 1px solid #0f0; cursor: pointer; font-family: monospace; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <button id="switchBtn">Камера</button>
        <button id="startBtn">Стать частью кода</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const video = document.createElement('video');
        video.setAttribute('playsinline', ''); // Важно для iPhone/Android
        
        let isMatrix = false;
        let useFront = true;
        const fontSize = 10;
        const chars = "0123456789ABCDEFHIJKLMNOPQRSTUVWXYZ";

        async function start() {
            try {
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                }
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: useFront ? "user" : "environment" }
                });
                video.srcObject = stream;
                video.play();
            } catch (e) {
                alert("Ошибка: Проверь, не открыта ли камера в другом приложении");
            }
        }

        document.getElementById('switchBtn').onclick = () => { useFront = !useFront; start(); };
        document.getElementById('startBtn').onclick = () => { isMatrix = !isMatrix; };

        function render() {
            const w = canvas.width = window.innerWidth;
            const h = canvas.height = window.innerHeight;

            if (video.readyState === 4) {
                if (isMatrix) {
                    ctx.fillStyle = "black";
                    ctx.fillRect(0, 0, w, h);
                    
                    const cols = Math.floor(w / fontSize);
                    const rows = Math.floor(h / fontSize);
                    
                    const temp = document.createElement('canvas');
                    temp.width = cols; temp.height = rows;
                    const tCtx = temp.getContext('2d');
                    
                    if (useFront) { tCtx.translate(cols, 0); tCtx.scale(-1, 1); }
                    tCtx.drawImage(video, 0, 0, cols, rows);
                    const data = tCtx.getImageData(0, 0, cols, rows).data;

                    ctx.font = fontSize + "px monospace";
                    for (let y = 0; y < rows; y++) {
                        for (let x = 0; x < cols; x++) {
                            const i = (y * cols + x) * 4;
                            const bright = (data[i] + data[i+1] + data[i+2]) / 3;
                            if (bright > 45) {
                                ctx.fillStyle = rgb(0, ${bright}, 0);
                                ctx.fillText(chars[Math.floor(Math.random()*chars.length)], x*fontSize, y*fontSize);
                            }
                        }
                    }
                } else {
                    ctx.save();
                    if (useFront) { ctx.translate(w, 0); ctx.scale(-1, 1); }
                    ctx.drawImage(video, 0, 0, w, h);
                    ctx.restore();
                }
            }
            requestAnimationFrame(render);
        }

        start();
        render();
    </script>
</body>
</html>
