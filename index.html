<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рабочий Проект</title>
    <style>
        /* CSS прямо здесь, чтобы всё отображалось корректно */
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Все работает!</h1>
        <p>Этот код адаптирован под мобильные устройства и iPhone.</p>
        <button onclick="testFunc()">Нажми меня</button>
        <div id="result"></div>
    </div>

    <script>
        // JavaScript без ошибок
        function testFunc() {
            document.getElementById('result').innerHTML = "<p style='color: green;'>Кнопка нажата, скрипт работает отлично!</p>";
            console.log("Проверка пройдена");
        }
    </script>
</body>
</html>
