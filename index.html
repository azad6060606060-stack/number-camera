<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATRIX LIVE CAMERA</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #startBtn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; background: #000; color: #0f0; border: 2px solid #0f0;
            font-family: monospace; font-size: 20px; cursor: pointer; z-index: 10;
            box-shadow: 0 0 20px #0f0;
        }
        video { position: absolute; visibility: hidden; }
    </style>
</head>
<body>

    <button id="startBtn">ПОДКЛЮЧИТЬ КАМЕРУ</button>
    <canvas id="c"></canvas>
    <video id="v" autoplay playsinline muted></video>

    <script>
        const btn = document.getElementById('startBtn');
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const ctx = c.getContext('2d', { willReadFrequently: true });
        
        const fontSize = 12;
        const symbols = "0123456789".split("");

        btn.onclick = async () => {
            btn.style.display = 'none';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                v.srcObject = stream;
                await v.play();
                render();
            } catch (e) {
                alert("Ошибка камеры: " + e);
            }
        };

        function render() {
            c.width = window.innerWidth;
            c.height = window.innerHeight;
            
            const cols = Math.floor(c.width / fontSize);
            const rows = Math.floor(c.height / fontSize);

            // Рисуем чёрный фон
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, c.width, c.height);

            // Создаем временный холст в памяти для анализа яркости кадра
            const tempC = document.createElement('canvas');
            const tempCtx = tempC.getContext('2d');
            tempC.width = cols;
            tempC.height = rows;
            tempCtx.drawImage(v, 0, 0, cols, rows);
            const imgData = tempCtx.getImageData(0, 0, cols, rows).data;

            ctx.font = fontSize + "px monospace";
            ctx.textAlign = "center";

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const i = (y * cols + x) * 4;
                    const brightness = (imgData[i] + imgData[i+1] + imgData[i+2]) / 3;

                    // Динамическая прозрачность: светлые места ярче, темные — почти невидимы
                    const alpha = 0.05 + (brightness / 255) * 0.95;
                    
                    if (brightness > 180) {
                        ctx.fillStyle = rgba(180, 255, 180, ${alpha}); // Светло-зеленый (засвет)
                        ctx.shadowBlur = 5;
                        ctx.shadowColor = "#0f0";
                    } else {
                        ctx.fillStyle = rgba(0, 255, 0, ${alpha}); // Обычный зеленый
                        ctx.shadowBlur = 0;
                    }

                    const char = symbols[Math.floor(Math.random() * symbols.length)];
                    ctx.fillText(char, x * fontSize + fontSize / 2, y * fontSize + fontSize);
                }
            }
            requestAnimationFrame(render);
        }
    </script>
</body>
</html>
