<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matrix Live GitHub</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        .ui {
            position: absolute; bottom: 40px; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            z-index: 100;
        }

        button {
            width: 85%; max-width: 300px; padding: 18px;
            background: rgba(0, 20, 0, 0.9); color: #0f0;
            border: 1px solid #0f0; border-radius: 8px;
            font-size: 16px; font-weight: bold; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            -webkit-tap-highlight-color: transparent;
        }

        button:active { background: #0f0; color: #000; }
        video { position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <canvas id="c"></canvas>
    <video id="v" autoplay playsinline muted></video>

    <div class="ui">
        <button id="camBtn">Сменить камеру</button>
        <button id="startBtn">Стать частью кода</button>
    </div>

    <script>
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const ctx = c.getContext('2d', { willReadFrequently: true });
        const startBtn = document.getElementById('startBtn');
        const camBtn = document.getElementById('camBtn');

        let mode = "environment"; 
        let active = false;
        const fSize = 12;
        const digits = "0123456789".split("");

        // Главная функция запуска
        async function start() {
            try {
                if (v.srcObject) {
                    v.srcObject.getTracks().forEach(t => t.stop());
                }

                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: mode }, 
                    audio: false 
                });
                
                v.srcObject = stream;
                // Ждём загрузки видео, чтобы Safari не ругался
                await new Promise((res) => v.onloadedmetadata = res);
                await v.play();
                
                if (!active) {
                    active = true;
                    render();
                }
                startBtn.innerText = "Выйти из матрицы";
            } catch (e) {
                alert("Ошибка! Проверь HTTPS или настройки камеры в браузере.");
            }
        }

        startBtn.onclick = () => {
            if (active) location.reload();
            else start();
        };

        camBtn.onclick = () => {
            mode = (mode === "environment") ? "user" : "environment";
            if (active) start(); // Перезапуск с новой камерой
        };

        function render() {
            if (!active) return;

            c.width = window.innerWidth;
            c.height = window.innerHeight;
            const cols = Math.floor(c.width / fSize);
            const rows = Math.floor(c.height / fSize);

            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, c.width, c.height);

            // Создаем невидимый холст для сканирования пикселей
            const tmp = document.createElement('canvas');
            tmp.width = cols; tmp.height = rows;
            const tCtx = tmp.getContext('2d');
            tCtx.drawImage(v, 0, 0, cols, rows);
            const pixels = tCtx.getImageData(0, 0, cols, rows).data;

            ctx.font = fSize + "px monospace";
            ctx.textAlign = "center";

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const i = (y * cols + x) * 4;
                    const bright = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                    
                    // Эффект свечения как ты просил
                    const alpha = 0.1 + (bright / 255) * 0.9;
                    
                    if (bright > 190) {
                        ctx.fillStyle = rgba(200, 255, 200, ${alpha});
                        ctx.shadowBlur = 4;
                        ctx.shadowColor = "#fff";
                    } else {
                        ctx.fillStyle = rgba(0, 255, 0, ${alpha});
                        ctx.shadowBlur = 0;
                    }

                    const num = digits[Math.floor(Math.random() * digits.length)];
                    ctx.fillText(num, x * fSize + fSize/2, y * fSize + fSize);
                }
            }
            requestAnimationFrame(render);
        }
    </script>
</body>
</html>
