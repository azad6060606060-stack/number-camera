<script>
let video = document.createElement('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');

let stream = null;
let devices = [];
let currentIndex = 0;

ctx.font = "10px monospace";

// получаем список камер
async function getCameras() {
    let all = await navigator.mediaDevices.enumerateDevices();
    devices = all.filter(d => d.kind === "videoinput");
}

// запуск камеры
async function startCamera() {
    try {
        if (stream) {
            stream.getTracks().forEach(t => t.stop());
        }

        if (devices.length === 0) {
            await getCameras();
        }

        let deviceId = devices[currentIndex].deviceId;

        stream = await navigator.mediaDevices.getUserMedia({
            video: { deviceId: { exact: deviceId } }
        });

        video.srcObject = stream;
        await video.play();

        video.onloadeddata = () => {
            canvas.width = 320;
            canvas.height = 240;
            draw();
        };

    } catch (e) {
        alert("Ошибка камеры: " + e.message);
        console.error(e);
    }
}

// переключение камеры
function switchCamera() {
    if (devices.length > 1) {
        currentIndex = (currentIndex + 1) % devices.length;
        startCamera();
    } else {
        alert("Только одна камера");
    }
}

// отрисовка
function draw() {
    if (video.readyState !== 4) {
        requestAnimationFrame(draw);
        return;
    }

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    let img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let data = img.data;

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let size = 8;

    for (let y = 0; y < canvas.height; y += size) {
        for (let x = 0; x < canvas.width; x += size) {

            let i = (y * canvas.width + x) * 4;

            let r = data[i];
            let g = data[i+1];
            let b = data[i+2];

            let brightness = (r + g + b) / 3;
            brightness = brightness < 120 ? brightness / 2 : brightness;

            let num = Math.floor(brightness / 25);

            ctx.fillStyle = rgb(0, ${brightness}, 0);
            ctx.fillText(num, x, y + size);
        }
    }

    requestAnimationFrame(draw);
}
</script>
